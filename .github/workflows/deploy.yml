name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # ADD THIS EXPLICIT STEP TO UPGRADE THE NODE ENVIRONMENT ENGINE:
      - name: Install and Setup Modern Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install, bundle, and build static assets
        uses: withastro/action@v3
        with:
          path: ./nuclear-nova

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static directory to Pages production edge
        id: deployment
        uses: actions/deploy-pages@v4